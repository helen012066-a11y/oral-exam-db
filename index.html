<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 教師甄試・口試題目資料庫</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B3A6B;
    --blue: #2E6DB4;
    --blue-light: #EBF2FB;
    --teal: #1A7A5E;
    --teal-light: #E6F4EF;
    --sand: #F7F5F0;
    --white: #FFFFFF;
    --gray-1: #F2F1EE;
    --gray-2: #E0DED8;
    --gray-3: #9E9C96;
    --gray-4: #5C5A55;
    --text: #1A1917;
    --radius: 8px;
    --radius-lg: 14px;
  }

  body {
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--sand);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    padding: 28px 32px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(27,58,107,0.18);
  }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-title { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 0.03em; }
  .header-title span { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.55); margin-left: 10px; }
  .stats-bar { display: flex; gap: 20px; }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* ── Layout ── */
  .layout { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 260px 1fr; gap: 24px; padding: 28px 20px 60px; align-items: start; }
  @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }

  /* ── Sidebar ── */
  .sidebar { position: sticky; top: 90px; }
  .filter-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-2); padding: 20px; margin-bottom: 16px; }
  .filter-card h3 { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-3); margin-bottom: 12px; }
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--gray-2); border-radius: var(--radius); font-size: 14px; background: var(--gray-1); outline: none; font-family: inherit; color: var(--text); transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--blue); background: #fff; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-3); pointer-events: none; }

  .filter-group { margin-bottom: 16px; }
  .filter-group:last-child { margin-bottom: 0; }
  .filter-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-4); margin-bottom: 8px; }
  .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 4px 11px; border-radius: 20px; border: 1px solid var(--gray-2); background: var(--gray-1); font-size: 12px; color: var(--gray-4); cursor: pointer; transition: all 0.12s; user-select: none; }
  .chip:hover { border-color: var(--blue); color: var(--blue); }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
  .chip.active-teal { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 600; }
  .reset-btn { width: 100%; padding: 8px; border: 1px solid var(--gray-2); border-radius: var(--radius); background: none; font-family: inherit; font-size: 13px; color: var(--gray-3); cursor: pointer; transition: all 0.12s; margin-top: 4px; }
  .reset-btn:hover { border-color: var(--gray-4); color: var(--gray-4); }

  /* ── Main ── */
  .main {}
  .result-info { font-size: 13px; color: var(--gray-3); margin-bottom: 16px; padding: 0 2px; }
  .result-info strong { color: var(--text); }

  /* Group section */
  .group-section { margin-bottom: 28px; }
  .group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .group-tag { background: var(--navy); color: #fff; font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px; white-space: nowrap; }
  .group-title { font-size: 17px; font-weight: 700; color: var(--navy); }
  .group-line { flex: 1; height: 1px; background: var(--gray-2); }

  /* Topic block */
  .topic-block { margin-bottom: 10px; border-radius: var(--radius-lg); border: 1px solid var(--gray-2); background: var(--white); overflow: hidden; }
  .topic-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--gray-1); cursor: pointer; user-select: none; }
  .topic-header:hover { background: var(--blue-light); }
  .topic-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
  .topic-name { font-size: 13px; font-weight: 700; color: var(--blue); flex: 1; }
  .topic-count { font-size: 11px; color: var(--gray-3); background: var(--gray-2); padding: 2px 8px; border-radius: 12px; }
  .topic-arrow { font-size: 11px; color: var(--gray-3); transition: transform 0.2s; }
  .topic-block.open .topic-arrow { transform: rotate(90deg); }

  .topic-body { display: none; padding: 12px 16px 14px; border-top: 1px solid var(--gray-2); }
  .topic-block.open .topic-body { display: block; }

  /* Entry */
  .entry { margin-bottom: 14px; }
  .entry:last-child { margin-bottom: 0; }
  .entry-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .meta-tag { font-size: 11px; padding: 2px 9px; border-radius: 12px; font-weight: 600; }
  .meta-subject { background: #EEF4FB; color: #1F5A9E; }
  .meta-note { background: #FFF4E0; color: #7A4F00; font-weight: 400; font-size: 11px; padding: 3px 10px; border-radius: var(--radius); border: 1px solid #FFE0A0; max-width: 100%; }
  .q-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .q-item { display: flex; gap: 9px; align-items: flex-start; font-size: 14px; line-height: 1.65; color: var(--text); }
  .q-num { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--blue-light); color: var(--blue); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
  .q-text { flex: 1; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--gray-3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* View toggle */
  .view-toggle { display: flex; gap: 6px; margin-bottom: 16px; }
  .view-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--gray-2); background: var(--gray-1); font-size: 13px; font-family: inherit; color: var(--gray-4); cursor: pointer; transition: all 0.12s; }
  .view-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; font-weight: 600; }

  .highlight { background: #fff176; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-title">教師甄試・口試題目資料庫 <span>秋燕教甄整理</span></div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">筆資料</div></div>
      <div class="stat"><div class="stat-num" id="s-q">—</div><div class="stat-label">道題目</div></div>
      <div class="stat"><div class="stat-num" id="s-county">—</div><div class="stat-label">個縣市</div></div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="filter-card">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="搜尋題目關鍵字…">
      </div>

      
      <div class="filter-group">
        <label>年度</label>
        <div class="chip-list" id="filter-year"></div>
      </div>

      <div class="filter-group">
        <label>縣市</label>
        <div class="chip-list" id="filter-county"></div>
      </div>

      <div class="filter-group">
        <label>教育階段</label>
        <div class="chip-list" id="filter-level"></div>
      </div>

      <div class="filter-group">
        <label>科別</label>
        <div class="chip-list" id="filter-subject"></div>
      </div>

      <button class="reset-btn" onclick="resetFilters()">清除所有篩選</button>
    </div>

    <div class="filter-card">
      <h3>題目類型</h3>
      <div class="chip-list" id="filter-topic"></div>
    </div>
  </aside>

  <main class="main">
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('county', this)">依縣市／階段</button>
      <button class="view-btn" onclick="setView('topic', this)">依題目類型</button>
    </div>
    <div class="result-info" id="result-info"></div>
    <div id="results"></div>
  </main>
</div>

// ═══════════════════════════════════════════
// TOPIC DEFINITIONS — 可自行新增類型
// ═══════════════════════════════════════════
const TOPICS = [
  { id:"intro",    name:"自我介紹",           fn: q => /自我介紹|自介/.test(q) },
  { id:"ai",       name:"AI與科技融入教學",    fn: q => /AI|人工智慧/.test(q) },
  { id:"inclusive",name:"融合教育與特殊教育",   fn: q => /融合教育|特教|特生|IEP|鑑定/.test(q) },
  { id:"parent",   name:"班級經營與親師溝通",   fn: q => /班級經營|親師|家長|溝通|衝突/.test(q) },
  { id:"curriculum",name:"課程設計與教學策略",  fn: q => /課綱|核心素養|課程|教學策略|SEL|SDG|作文|閱讀/.test(q) },
  { id:"safety",   name:"校園霸凌與性平事件",   fn: q => /霸凌|性平|自傷/.test(q) },
  { id:"support",  name:"學習扶助與弱勢學生",   fn: q => /學習扶助|偏鄉|學習動機|低落|落後/.test(q) },
  { id:"admin",    name:"行政業務與學校治理",   fn: q => /行政|教務|主任|校事會議/.test(q) },
  { id:"policy",   name:"教育政策與時事",       fn: q => /教育政策|少子化|教育議題/.test(q) },
  { id:"personal", name:"個人特質與從師動機",   fn: q => /韌性|特質|挫折|為何|為什麼|交換|當老師/.test(q) },
];
function getTopics(q) {
  const matched = TOPICS.filter(t => t.fn(q));
  return matched.length ? matched : [{ id:"other", name:"其他", fn:()=>true }];
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = { year: new Set(), county: new Set(), level: new Set(), subject: new Set(), topic: new Set(), search: "", view: "county" };

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function unique(arr) { return [...new Set(arr)].filter(Boolean).sort(); }

function buildFilters() {
  const years     = unique(DATA.map(d => d.year || "")).filter(Boolean).sort((a,b)=>b-a);
  const counties  = unique(DATA.map(d => d.county));
  const levels    = unique(DATA.map(d => d.level));
  const subjects  = unique(DATA.map(d => d.subject));
  const topicList = TOPICS;

  function chips(id, items, stateKey, teal=false) {
    const el = document.getElementById(id);
    el.innerHTML = items.map(v => {
      const label = typeof v === "string" ? v : v.name;
      const key   = typeof v === "string" ? v : v.id;
      return `<span class="chip" data-key="${key}" onclick="toggleFilter('${stateKey}','${key}',this,${teal})">${label}</span>`;
    }).join('');
  }

  chips("filter-year",    years,     "year");
  chips("filter-county",  counties,  "county");
  chips("filter-level",   levels,    "level");
  chips("filter-subject", subjects,  "subject");
  chips("filter-topic",   topicList, "topic", true);
}

function toggleFilter(key, val, el, teal=false) {
  if (state[key].has(val)) { state[key].delete(val); el.classList.remove("active","active-teal"); }
  else { state[key].add(val); el.classList.add(teal ? "active-teal" : "active"); }
  render();
}

function resetFilters() {
  ["year","county","level","subject","topic"].forEach(k => state[k].clear());
  state.search = "";
  document.getElementById("search").value = "";
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active","active-teal"));
  render();
}

function setView(v, btn) {
  state.view = v;
  document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

// ═══════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════
function filterData() {
  const kw = state.search.trim().toLowerCase();
  return DATA.map(entry => {
    if (state.year.size    && !state.year.has(entry.year || ""))  return null;
    if (state.county.size  && !state.county.has(entry.county))   return null;
    if (state.level.size   && !state.level.has(entry.level))     return null;
    if (state.subject.size && !state.subject.has(entry.subject)) return null;
    const qs = entry.questions.filter(q => {
      if (kw && !q.toLowerCase().includes(kw)) return false;
      if (state.topic.size) {
        const qt = getTopics(q).map(t=>t.id);
        if (![...state.topic].some(t => qt.includes(t))) return false;
      }
      return true;
    });
    if (!qs.length) return null;
    return { ...entry, questions: qs };
  }).filter(Boolean);
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function hl(text) {
  const kw = state.search.trim();
  if (!kw) return text;
  const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return text.replace(re, m => `<mark class="highlight">${m}</mark>`);
}

function renderEntry(entry) {
  const meta = [
    entry.subject ? `<span class="meta-tag meta-subject">${entry.subject}</span>` : "",
  ].join("");
  const note = entry.note ? `<div class="meta-note">📌 ${entry.note}</div>` : "";
  const qs = entry.questions.map((q,i) =>
    `<li class="q-item"><span class="q-num">${i+1}</span><span class="q-text">${hl(q)}</span></li>`
  ).join("");
  return `
    <div class="entry">
      ${meta || note ? `<div class="entry-meta">${meta}${note}</div>` : ""}
      <ul class="q-list">${qs}</ul>
    </div>`;
}

function renderByCounty(filtered) {
  const groups = new Map();
  filtered.forEach(entry => {
    const key = entry.county + "||" + entry.level;
    if (!groups.has(key)) groups.set(key, { county:entry.county, level:entry.level, entries:[] });
    groups.get(key).entries.push(entry);
  });

  let html = "";
  let gIdx = 0;
  groups.forEach(({ county, level, entries }) => {
    gIdx++;
    const topicMap = new Map();
    entries.forEach(entry => {
      entry.questions.forEach(q => {
        getTopics(q).forEach(t => {
          if (!topicMap.has(t.id)) topicMap.set(t.id, { name:t.name, items:[] });
          let last = topicMap.get(t.id).items.at(-1);
          if (!last || last.entry !== entry) { last = { entry, qs:[] }; topicMap.get(t.id).items.push(last); }
          last.qs.push(q);
        });
      });
    });

    const tBlocks = [...topicMap.entries()].map(([tid, {name, items}]) => {
      const body = items.map(({entry, qs}) => renderEntry({...entry, questions:qs})).join("");
      return `
        <div class="topic-block" onclick="toggleBlock(this)">
          <div class="topic-header">
            <span class="topic-dot"></span>
            <span class="topic-name">${name}</span>
            <span class="topic-count">${items.reduce((s,i)=>s+i.qs.length,0)} 題</span>
            <span class="topic-arrow">▶</span>
          </div>
          <div class="topic-body">${body}</div>
        </div>`;
    }).join("");

    html += `
      <div class="group-section">
        <div class="group-header">
          <span class="group-tag">${gIdx}</span>
          <span class="group-title">${county}・${level}</span>
          <div class="group-line"></div>
          <span style="font-size:12px;color:var(--gray-3)">${entries.length} 筆</span>
        </div>
        ${tBlocks}
      </div>`;
  });
  return html;
}

function renderByTopic(filtered) {
  const topicMap = new Map();
  filtered.forEach(entry => {
    entry.questions.forEach(q => {
      getTopics(q).forEach(t => {
        if (!topicMap.has(t.id)) topicMap.set(t.id, { name:t.name, groups:new Map() });
        const gKey = entry.county + "・" + entry.level;
        const tm = topicMap.get(t.id);
        if (!tm.groups.has(gKey)) tm.groups.set(gKey, []);
        let last = tm.groups.get(gKey).at(-1);
        if (!last || last.entry !== entry) { last = { entry, qs:[] }; tm.groups.get(gKey).push(last); }
        last.qs.push(q);
      });
    });
  });

  let html = "";
  let tIdx = 0;
  topicMap.forEach(({ name, groups }) => {
    tIdx++;
    const totalQ = [...groups.values()].flat().reduce((s,i)=>s+i.qs.length,0);
    const gBlocks = [...groups.entries()].map(([gKey, items]) => {
      const body = items.map(({entry, qs}) => renderEntry({...entry, questions:qs})).join("");
      return `
        <div class="topic-block" onclick="toggleBlock(this)">
          <div class="topic-header">
            <span class="topic-dot" style="background:var(--teal)"></span>
            <span class="topic-name" style="color:var(--teal)">${gKey}</span>
            <span class="topic-count">${items.reduce((s,i)=>s+i.qs.length,0)} 題</span>
            <span class="topic-arrow">▶</span>
          </div>
          <div class="topic-body">${body}</div>
        </div>`;
    }).join("");

    html += `
      <div class="group-section">
        <div class="group-header">
          <span class="group-tag" style="background:var(--teal)">${tIdx}</span>
          <span class="group-title">${name}</span>
          <div class="group-line"></div>
          <span style="font-size:12px;color:var(--gray-3)">${totalQ} 題</span>
        </div>
        ${gBlocks}
      </div>`;
  });
  return html;
}

function toggleBlock(el) {
  el.classList.toggle("open");
}

function render() {
  const filtered = filterData();
  const totalQ = filtered.reduce((s,d) => s+d.questions.length, 0);
  document.getElementById("result-info").innerHTML =
    `篩選結果：<strong>${filtered.length}</strong> 筆資料・<strong>${totalQ}</strong> 道題目`;

  const container = document.getElementById("results");
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>沒有符合條件的題目，試著調整篩選條件</p></div>`;
    return;
  }
  container.innerHTML = state.view === "county" ? renderByCounty(filtered) : renderByTopic(filtered);
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

const totalQ = DATA.reduce((s,d) => s+d.questions.length, 0);
const counties = new Set(DATA.map(d=>d.county)).size;
document.getElementById("s-total").textContent = DATA.length;
document.getElementById("s-q").textContent = totalQ;
document.getElementById("s-county").textContent = counties;

buildFilters();
render();
</script>
</body>
</html>
